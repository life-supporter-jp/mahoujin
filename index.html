<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マルチサイズ魔方陣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        /* --- 1. 全体レイアウト：最大800px・完全中央寄せ --- */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0 auto;       /* 左右をautoにすることでPC画面で中央配置 */
            padding: 10px;
            max-width: 800px;     /* PCでの最大幅を800pxに制限 */
            min-height: 100vh;
            box-sizing: border-box; /* パディングを含めた幅計算 */
            overflow-x: hidden;   /* 横スクロールの発生を防ぐ */
        }

        /* --- 2. 画像の自動リサイズ（中央配置） --- */
        img {
            max-width: 100% !important; 
            height: auto !important;
            display: block;
            margin: 0 auto 15px auto;   /* 画像そのものを中央に寄せる */
        }

        .container {
            background-color: #fff;
            padding: 1.25rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;          
            box-sizing: border-box;
            margin: 0 auto 30px auto; /* コンテナ自体を中央寄せ */
        }

        h1 {
            font-size: 1.8rem;
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 0.5rem;
        }

        /* --- 3. 盤面：スマホではみ出さないための最重要設定 --- */
        #sudoku-grid {
            display: grid;
            grid-gap: 2px;
            margin: 15px auto;    /* 盤面を中央に配置 */
            border: 3px solid #333;
            
            /* スマホで右側がはみ出さないように vw（画面幅単位）を使用 */
            width: 88vw;          /* 画面幅の88%に抑えて余白を確保 */
            max-width: 450px;     /* PCで大きくなりすぎないように制限 */
            aspect-ratio: 1 / 1;  /* 常に正方形を維持 */
            box-sizing: border-box;
        }

        #sudoku-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
        #sudoku-grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
        #sudoku-grid.grid-5 { grid-template-columns: repeat(5, 1fr); }

        .cell {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #fff;
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            /* 数字が枠を突き抜けないように可変フォントサイズに設定 */
            font-size: clamp(1rem, 6vw, 1.8rem); 
        }

        .cell-content {
            font-weight: bold;
            color: #1a202c;
        }

        .given { background-color: #e2e8f0; color: #4a5568; cursor: not-allowed; }
        .correct { background-color: #c6f6d5; }
        .incorrect { background-color: #feb2b2; }
        .active-cell { background-color: #90cdf4; }

        /* 操作パネル（ボタン） */
        .controls {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .num-button, .control-button {
            width: 42px;
            height: 42px;
            background-color: #4a90e2;
            color: #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .control-button.clear { background-color: #e53e3e; width: 55px; }

        /* スマホ向け：チェックと新規ゲームボタンを並べる */
        @media (max-width: 600px) {
            #check-button, #new-game-button {
                width: 44%; 
                margin: 10px 2%;
                font-size: 0.9rem;
            }
        }

        .description { text-align: left; line-height: 1.5; font-size: 0.95rem; }
    </style>
</head>
<body>

    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="タイトル画像">

    <div style="text-align: center; margin-bottom: 10px;">
        <h3><span style="font-size: 17px; font-weight: bold;">魔法定数が縦、横、斜め、の合計数になるように数字を入れていきましょう。</span></h3>
    </div>

    <div class="container">
        <h1>魔方陣ゲーム</h1>
        
        <div id="magic-constant-display" style="font-weight: bold; background: #e2e8f0; padding: 8px; border-radius: 8px; margin-bottom: 15px; font-size: 1rem;"></div>

        <div id="size-selector" class="flex justify-center gap-2 mb-4">
            <button class="px-4 py-1 bg-gray-200 rounded" data-size="3">3x3</button>
            <button class="px-4 py-1 bg-gray-200 rounded" data-size="4">4x4</button>
            <button class="px-4 py-1 bg-gray-200 rounded" data-size="5">5x5</button>
        </div>

        <div id="sudoku-grid"></div>

        <div class="controls" id="number-controls"></div>

        <div class="flex justify-center mt-4">
            <button id="check-button" class="px-5 py-2 bg-green-500 text-white font-bold rounded-lg shadow">チェック</button>
            <button id="new-game-button" class="ml-2 px-5 py-2 bg-blue-500 text-white font-bold rounded-lg shadow">新しいゲーム</button>
        </div>

        <div id="message" class="mt-4 font-bold h-6"></div>

        <div class="description mt-6 border-t pt-4">
            <p><strong style="font-size: 1.1rem;">魔方陣とは？</strong></p>
            <p>縦・横・対角線の数字の合計がすべて同じ値（魔法定数）になる正方形のパズルです。</p>
        </div>
    </div>

    <div style="margin-top: 10px; text-align: center;">
        <p style="font-size: 16px; font-weight: bold; margin-bottom: 15px;">
            今回のアプリは如何だったでしょうか？脳トレや趣味のサイトをご案内します。
        </p>
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg" alt="案内画像">
        
        <div style="margin-top: 20px;">
            <p style="font-size: 20px; font-weight: bold;">以下より体験版をご確認ください。</p>
            <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012100.jpg" style="width: 180px; margin-top: 10px;">
            <div style="margin-top: 10px;">
                <a href="https://life-supporter.jp/lp/HRSuykFf" style="color: blue; font-size: 18px; text-decoration: underline;">
                    https://life-supporter.jp/lp/HRSuykFf
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridElement = document.getElementById('sudoku-grid');
            const sizeSelector = document.getElementById('size-selector');
            const numberControls = document.getElementById('number-controls');
            const checkButton = document.getElementById('check-button');
            const newGameButton = document.getElementById('new-game-button');
            const messageElement = document.getElementById('message');
            const magicConstantDisplay = document.getElementById('magic-constant-display');
            
            let activeCell = null;
            let currentBoard = [];
            let solvedBoard = [];
            let gridSize = 3;
            let magicConstant = 15;

            function generate3x3() { magicConstant = 15; return [[8, 1, 6], [3, 5, 7], [4, 9, 2]]; }
            function generate4x4() { magicConstant = 34; return [[1, 15, 14, 4], [12, 6, 7, 9], [8, 10, 11, 5], [13, 3, 2, 16]]; }
            function generate5x5() { magicConstant = 65; return [[17, 24, 1, 8, 15], [23, 5, 7, 14, 16], [4, 6, 13, 20, 22], [10, 12, 19, 21, 3], [11, 18, 25, 2, 9]]; }

            function createPuzzle(solved) {
                return solved.map(row => row.map(val => Math.random() > 0.4 ? val : 0));
            }

            function renderGrid() {
                gridElement.innerHTML = '';
                gridElement.className = 'grid-' + gridSize;
                currentBoard.forEach((row, r) => {
                    row.forEach((val, c) => {
                        const cell = document.createElement('div');
                        cell.classList.add('cell');
                        if (val !== 0 && val === solvedBoard[r][c]) cell.classList.add('given');
                        
                        const content = document.createElement('div');
                        content.classList.add('cell-content');
                        content.textContent = val !== 0 ? val : '';
                        cell.appendChild(content);

                        if (!cell.classList.contains('given')) {
                            cell.addEventListener('click', () => {
                                if (activeCell) activeCell.classList.remove('active-cell');
                                activeCell = cell;
                                activeCell.classList.add('active-cell');
                            });
                        }
                        cell.dataset.r = r; cell.dataset.c = c;
                        gridElement.appendChild(cell);
                    });
                });
            }

            function renderButtons() {
                numberControls.innerHTML = '';
                for (let i = 1; i <= gridSize * gridSize; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'num-button';
                    btn.textContent = i;
                    btn.onclick = () => {
                        if (!activeCell) return;
                        const r = activeCell.dataset.r; const c = activeCell.dataset.c;
                        currentBoard[r][c] = i;
                        activeCell.querySelector('.cell-content').textContent = i;
                    };
                    numberControls.appendChild(btn);
                }
                const clr = document.createElement('button');
                clr.className = 'control-button clear';
                clr.textContent = '消去';
                clr.onclick = () => {
                    if (!activeCell) return;
                    currentBoard[activeCell.dataset.r][activeCell.dataset.c] = 0;
                    activeCell.querySelector('.cell-content').textContent = '';
                };
                numberControls.appendChild(clr);
            }

            function check() {
                let win = true;
                gridElement.querySelectorAll('.cell').forEach(cell => {
                    const r = cell.dataset.r; const c = cell.dataset.c;
                    cell.classList.remove('correct', 'incorrect');
                    if (currentBoard[r][c] === solvedBoard[r][c]) {
                        cell.classList.add('correct');
                    } else if (currentBoard[r][c] !== 0) {
                        cell.classList.add('incorrect');
                        win = false;
                    } else { win = false; }
                });
                messageElement.textContent = win ? "正解です！お見事！" : "どこかが違っているか、未入力です。";
                messageElement.style.color = win ? "green" : "red";
            }

            function start() {
                if (gridSize === 3) solvedBoard = generate3x3();
                else if (gridSize === 4) solvedBoard = generate4x4();
                else solvedBoard = generate5x5();
                magicConstantDisplay.textContent = `魔法定数（合計値）: ${magicConstant}`;
                currentBoard = createPuzzle(solvedBoard);
                messageElement.textContent = '';
                renderGrid();
                renderButtons();
            }

            sizeSelector.onclick = (e) => {
                if (e.target.dataset.size) {
                    sizeSelector.querySelectorAll('button').forEach(b => b.classList.remove('bg-blue-500', 'text-white'));
                    e.target.classList.add('bg-blue-500', 'text-white');
                    gridSize = parseInt(e.target.dataset.size);
                    start();
                }
            };

            checkButton.onclick = check;
            newGameButton.onclick = start;
            start();
        });
    </script>
</body>
</html>
