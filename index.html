<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マルチサイズ魔方陣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        /* --- 1. 全要素のサイズ計算を固定（はみ出し防止の基本） --- */
        * {
            box-sizing: border-box;
        }

        /* --- 2. 全体レイアウト：PC中央寄せ & スマホ横揺れ防止 --- */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0 auto !important; /* PCで確実に中央へ */
            padding: 10px;
            max-width: 800px;         /* PCでの最大幅 */
            width: 100%;              /* スマホでは横幅いっぱい */
            display: block;           /* flexを解除して中央寄せを安定化 */
            overflow-x: hidden;       /* 右側の余計な隙間・はみ出しをカット */
            min-height: 100vh;
        }

        /* --- 3. 画像：枠内に収め、中央に配置 --- */
        img {
            max-width: 100% !important; 
            height: auto !important;
            display: block;
            margin: 0 auto 15px auto;
        }

        .container {
            background-color: #fff;
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;          
            margin: 0 auto 30px auto; /* コンテナ自体を中央寄せ */
        }

        /* --- 4. 盤面：スマホの画面幅から絶対にはみ出さない設定 --- */
        #sudoku-grid {
            display: grid;
            grid-gap: 2px;
            margin: 15px auto;
            border: 3px solid #333;
            
            /* 横幅を画面の85%程度に抑えることで、右側の余白を確保 */
            width: 85vw;          
            max-width: 400px;     /* PCで大きくなりすぎない */
            aspect-ratio: 1 / 1;  /* 正方形維持 */
            background-color: #333; /* 隙間の線の色 */
        }

        #sudoku-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
        #sudoku-grid.grid-4 { grid-template-columns: repeat(4, 1fr); }
        #sudoku-grid.grid-5 { grid-template-columns: repeat(5, 1fr); }

        .cell {
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: clamp(0.9rem, 5vw, 1.5rem); 
        }

        .cell-content { font-weight: bold; color: #1a202c; }
        .given { background-color: #e2e8f0; color: #4a5568; }
        .correct { background-color: #c6f6d5; }
        .incorrect { background-color: #feb2b2; }
        .active-cell { background-color: #90cdf4; }

        /* ボタン類の折り返し設定 */
        .controls {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }

        .num-button, .control-button {
            width: 40px;
            height: 40px;
            background-color: #4a90e2;
            color: #fff;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .control-button.clear { background-color: #e53e3e; width: 50px; }

        @media (max-width: 600px) {
            #check-button, #new-game-button {
                width: 46%; 
                margin: 8px 1%;
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>

    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="タイトル画像">

    <div style="text-align: center; padding: 0 10px;">
        <h3 style="font-size: 17px; font-weight: bold; line-height: 1.4;">
            魔法定数が縦、横、斜め、の合計数になるように数字を入れていきましょう。
        </h3>
    </div>

    <div class="container">
        <h1 style="font-size: 1.5rem; font-weight: bold; color: #4a90e2; margin-bottom: 10px;">魔方陣ゲーム</h1>
        
        <div id="magic-constant-display" style="font-weight: bold; background: #e2e8f0; padding: 8px; border-radius: 8px; margin-bottom: 15px;"></div>
<p>以下よりマス目を選択できます。</p> <br>
        <div id="size-selector" class="flex justify-center gap-2 mb-4">
                   
            <button class="px-4 py-1 bg-gray-200 rounded" data-size="3">3x3</button>
            <button class="px-4 py-1 bg-gray-200 rounded" data-size="4">4x4</button>
            <button class="px-4 py-1 bg-gray-200 rounded" data-size="5">5x5</button>
        </div>

        <div id="sudoku-grid"></div>

        <div class="controls" id="number-controls"></div>

        <div class="flex justify-center mt-4">
            <button id="check-button" class="px-5 py-2 bg-green-500 text-white font-bold rounded-lg">チェック</button>
            <button id="new-game-button" class="ml-2 px-5 py-2 bg-blue-500 text-white font-bold rounded-lg">新しいゲーム</button>
        </div>

        <div id="message" class="mt-3 font-bold text-sm h-5"></div>
    </div>

    <div style="text-align: center; width: 100%;">
        <p style="font-size: 15px; font-weight: bold; margin-bottom: 10px; padding: 0 10px;">
            今回のアプリは如何だったでしょうか？他にも使えるアプリ、脳トレができるゲームや趣味に俳句、和歌などが利用できるサイトをご案内します。また大事な記録をサーバーに残せるサイトで、何かあった時に情報開示も指定できるサイトです。スマホのID、PWを記録しておくと安心です。
        </p>
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg" alt="案内画像">
        
        <div style="margin-top: 20px;">
            <p style="font-size: 18px; font-weight: bold;">以下より体験版をご確認ください。</p>
            <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012100.jpg" style="width: 150px; margin: 10px auto;">
            <a href="https://life-supporter.jp/lp/HRSuykFf" style="color: blue; font-size: 16px; text-decoration: underline; display: block;">
                https://life-supporter.jp/lp/HRSuykFf
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridElement = document.getElementById('sudoku-grid');
            const sizeSelector = document.getElementById('size-selector');
            const numberControls = document.getElementById('number-controls');
            const checkButton = document.getElementById('check-button');
            const newGameButton = document.getElementById('new-game-button');
            const messageElement = document.getElementById('message');
            const magicConstantDisplay = document.getElementById('magic-constant-display');
            
            let activeCell = null;
            let currentBoard = [];
            let solvedBoard = [];
            let gridSize = 3;
            let magicConstant = 15;

            function generate3x3() { magicConstant = 15; return [[8, 1, 6], [3, 5, 7], [4, 9, 2]]; }
            function generate4x4() { magicConstant = 34; return [[1, 15, 14, 4], [12, 6, 7, 9], [8, 10, 11, 5], [13, 3, 2, 16]]; }
            function generate5x5() { magicConstant = 65; return [[17, 24, 1, 8, 15], [23, 5, 7, 14, 16], [4, 6, 13, 20, 22], [10, 12, 19, 21, 3], [11, 18, 25, 2, 9]]; }

            function createPuzzle(solved) {
                return solved.map(row => row.map(val => Math.random() > 0.4 ? val : 0));
            }

            function renderGrid() {
                gridElement.innerHTML = '';
                gridElement.className = 'grid-' + gridSize;
                currentBoard.forEach((row, r) => {
                    row.forEach((val, c) => {
                        const cell = document.createElement('div');
                        cell.classList.add('cell');
                        if (val !== 0 && val === solvedBoard[r][c]) cell.classList.add('given');
                        
                        const content = document.createElement('div');
                        content.classList.add('cell-content');
                        content.textContent = val !== 0 ? val : '';
                        cell.appendChild(content);

                        if (!cell.classList.contains('given')) {
                            cell.addEventListener('click', () => {
                                if (activeCell) activeCell.classList.remove('active-cell');
                                activeCell = cell;
                                activeCell.classList.add('active-cell');
                            });
                        }
                        cell.dataset.r = r; cell.dataset.c = c;
                        gridElement.appendChild(cell);
                    });
                });
            }

            function renderButtons() {
                numberControls.innerHTML = '';
                for (let i = 1; i <= gridSize * gridSize; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'num-button';
                    btn.textContent = i;
                    btn.onclick = () => {
                        if (!activeCell) return;
                        currentBoard[activeCell.dataset.r][activeCell.dataset.c] = i;
                        activeCell.querySelector('.cell-content').textContent = i;
                    };
                    numberControls.appendChild(btn);
                }
                const clr = document.createElement('button');
                clr.className = 'control-button clear';
                clr.textContent = '消去';
                clr.onclick = () => {
                    if (!activeCell) return;
                    currentBoard[activeCell.dataset.r][activeCell.dataset.c] = 0;
                    activeCell.querySelector('.cell-content').textContent = '';
                };
                numberControls.appendChild(clr);
            }

            function start() {
                if (gridSize === 3) solvedBoard = generate3x3();
                else if (gridSize === 4) solvedBoard = generate4x4();
                else solvedBoard = generate5x5();
                magicConstantDisplay.textContent = `魔法定数: ${magicConstant}`;
                currentBoard = createPuzzle(solvedBoard);
                messageElement.textContent = '';
                renderGrid();
                renderButtons();
            }

            sizeSelector.onclick = (e) => {
                if (e.target.dataset.size) {
                    sizeSelector.querySelectorAll('button').forEach(b => b.classList.remove('bg-blue-500', 'text-white'));
                    e.target.classList.add('bg-blue-500', 'text-white');
                    gridSize = parseInt(e.target.dataset.size);
                    start();
                }
            };

            checkButton.onclick = () => {
                let win = true;
                gridElement.querySelectorAll('.cell').forEach(cell => {
                    const r = cell.dataset.r; const c = cell.dataset.c;
                    cell.classList.remove('correct', 'incorrect');
                    if (currentBoard[r][c] === solvedBoard[r][c]) cell.classList.add('correct');
                    else { cell.classList.add('incorrect'); win = false; }
                });
                messageElement.textContent = win ? "正解です！" : "まだ間違いがあります。";
                messageElement.style.color = win ? "green" : "red";
            };

            newGameButton.onclick = start;
            start();
        });
    </script>
</body>
</html>
